{% extends "base.html" %}

{% block title %}Error | Movie Recommendation System{% endblock %}

{% block page_css %}
<style>
    .error-container {
        text-align: center;
        max-width: 700px;
        margin: 8vh auto 0;
        padding: 2rem;
        border-radius: 18px;
        border: 1px solid var(--ghost-border);
        background: var(--ghost-surface);
    }
    h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin-bottom: 1rem;
        line-height: 1;
    }
    p {
        font-size: 1.05rem;
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
        line-height: 1.6;
        text-transform: none;
        letter-spacing: 0.02em;
    }
    .home-button {
        display: inline-block;
        padding: 1rem 2rem;
        background: var(--ghost-surface);
        border: 1px solid var(--ghost-border);
        color: var(--text-primary);
        text-decoration: none;
        border-radius: 32px;
        font-weight: 700;
        transition: all 0.2s ease;
        letter-spacing: 0.1em;
    }
    .home-button:hover {
        background: rgba(240, 240, 250, 0.2);
    }
</style>
{% endblock %}


{% block content %}
<div class="error-container">
    <h1 class="page-title">Oops! Something went wrong</h1>
    <p>{{ error_message|default:"An unexpected error occurred. Please try again later." }}</p>
    <a href="{% url 'recommender:main' %}" class="home-button">Back to Home</a>
</div>
{% endblock %}
