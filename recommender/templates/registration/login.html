{% extends "base.html" %}

{% block title %}Login | Movie Recommendation System{% endblock %}

{% block page_css %}
<style>
    .auth-card {
        width: 100%;
        max-width: 460px;
        margin: 6vh auto 0;
        background: var(--ghost-surface);
        padding: 2rem;
        border-radius: 18px;
        border: 1px solid var(--ghost-border);
    }
    .auth-card h1 {
        margin: 0 0 1rem;
    }
    .auth-card p { color: var(--text-secondary); }
    .auth-card p, .auth-links {
        text-transform: none;
        letter-spacing: 0.02em;
    }
    .auth-card input {
        width: 100%;
        padding: 0.75rem 0.9rem;
        border-radius: 32px;
        border: 1px solid var(--ghost-border);
        background: var(--ghost-surface);
        color: var(--text-primary);
        margin-top: 0.2rem;
        text-transform: uppercase;
    }
    .auth-card input:focus { outline: none; border-color: rgba(240, 240, 250, 0.6); }
    .auth-card .btn-pill { width: 100%; margin-top: 0.75rem; }
    .auth-links { margin-top: 1rem; font-size: 0.95rem; }
    .auth-links a { color: var(--text-primary); text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div class="auth-card">
    <h1 class="page-title">Login</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-pill" type="submit">Sign in</button>
    </form>
    <div class="auth-links">
        <p><a href="{% url 'recommender:signup' %}">Create an account</a></p>
        <p><a href="{% url 'recommender:main' %}">Back to home</a></p>
    </div>
</div>
{% endblock %}
